@if (loaded()) {
<div class="p-6">
  <h2 class="text-2xl font-bold mb-6 text-black">
    {{ isEditing() ? 'Editar Artículo' : 'Nuevo Artículo' }}
  </h2>
  <form [formGroup]="formArticulo" (ngSubmit)="onSubmit()" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Nombre</label>
        <input type="text" formControlName="nombre"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Imagen (URL)</label>
        <input type="text" formControlName="imagen"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Descripción</label>
      <textarea formControlName="descripcion" rows="3"
        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2"></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Categoría</label>
        <input type="text" formControlName="categoria"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Subcategoría</label>
        <input type="text" formControlName="subcategoria"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Marca</label>
        <input type="text" formControlName="marca"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Precio</label>
        <input type="number" formControlName="precio"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Precio Rebajado</label>
        <input type="number" formControlName="precioRebajado"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Stock</label>
        <input type="number" formControlName="stock"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Color</label>
        <input type="text" formControlName="color"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Fecha de lanzamiento</label>
        <input type="date" formControlName="fechaLanzamiento"
          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-black focus:ring-black sm:text-sm border p-2">
      </div>
    </div>

    <div class="flex justify-end pt-4">
      <button
        type="submit"
        [disabled]="formArticulo.pending"
        [class.opacity-50]="formArticulo.invalid"
        [class.cursor-not-allowed]="formArticulo.invalid"
        class="bg-black text-white px-6 py-2 rounded-md hover:bg-gray-800 disabled:opacity-50 transition-colors"
      >
        {{ isEditing() ? 'Guardar cambios' : 'Guardar Artículo' }}
      </button>
    </div>

    @if (submitted() && formArticulo.invalid) {
      <div class="text-sm text-red-600">
        Revisa estos campos: <span class="font-medium">{{ invalidFieldNames().join(', ') }}</span>
      </div>
    }
  </form>
</div>
}
